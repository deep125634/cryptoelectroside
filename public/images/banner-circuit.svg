<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="presentation" aria-hidden="true">
  <defs>
    <linearGradient id="paper-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFCF7" />
      <stop offset="55%"  stop-color="#F3EEE3" />
      <stop offset="100%" stop-color="#E7DFCE" />
    </linearGradient>
    <radialGradient id="center-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#E87722" stop-opacity="0.32" />
      <stop offset="55%"  stop-color="#E87722" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#E87722" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="amber-trace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E87722" stop-opacity="0" />
      <stop offset="50%"  stop-color="#E87722" stop-opacity="1" />
      <stop offset="100%" stop-color="#E87722" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="node-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#E87722" stop-opacity="0.95" />
      <stop offset="55%" stop-color="#E87722" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#E87722" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" />
    </filter>

    <style><![CDATA[
      @keyframes traceFlow      { from { stroke-dashoffset: 0; }    to { stroke-dashoffset: -240; } }
      @keyframes traceFlowSlow  { from { stroke-dashoffset: 0; }    to { stroke-dashoffset: -160; } }
      @keyframes traceFlowRev   { from { stroke-dashoffset: 0; }    to { stroke-dashoffset: 240;  } }
      @keyframes nodePulse      { 0%, 100% { transform: scale(1);   opacity: 0.9; } 50% { transform: scale(1.7); opacity: 0.4; } }
      @keyframes centerBreath   { 0%, 100% { opacity: 0.85; transform: scale(1); } 50% { opacity: 1; transform: scale(1.04); } }
      @keyframes chipGlow       { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

      .t-fast { stroke-dasharray: 14 10; animation: traceFlow     6s linear infinite; }
      .t-med  { stroke-dasharray: 12 12; animation: traceFlowSlow 8s linear infinite; }
      .t-rev  { stroke-dasharray: 12 10; animation: traceFlowRev  9s linear infinite; }
      .node   { transform-box: fill-box; transform-origin: center; animation: nodePulse 2.6s ease-in-out infinite; }
      .n1 { animation-delay: 0s;   } .n2 { animation-delay: 0.3s; } .n3 { animation-delay: 0.6s; }
      .n4 { animation-delay: 0.9s; } .n5 { animation-delay: 1.2s; } .n6 { animation-delay: 1.5s; }
      .n7 { animation-delay: 1.8s; } .n8 { animation-delay: 2.1s; }
      .chip-glow { animation: chipGlow 4s ease-in-out infinite; }
      .center-aura { transform-origin: center; animation: centerBreath 6s ease-in-out infinite; }
    ]]></style>
  </defs>

  <!-- Background paper -->
  <rect width="1920" height="1080" fill="url(#paper-bg)" />

  <!-- Center radial glow behind chip -->
  <circle cx="960" cy="540" r="500" fill="url(#center-glow)" class="center-aura" />

  <!-- Dim baseline circuit traces (long thin lines reaching the edges) -->
  <g stroke="#1C1917" stroke-opacity="0.18" stroke-width="1" fill="none" stroke-linecap="square">
    <!-- TOP-LEFT quadrant traces (radiating from chip top + left edges) -->
    <path d="M780 380 L780 240 L640 240 L600 200 L600 80 L380 80 L340 40 L60 40" />
    <path d="M820 380 L820 200 L700 200 L660 160 L660 60 L420 60" />
    <path d="M860 380 L860 280 L780 280" />
    <path d="M740 420 L580 420 L540 380 L380 380 L340 340 L40 340" />
    <path d="M740 460 L500 460 L460 420 L260 420 L220 380 L40 380" />
    <path d="M740 500 L460 500 L420 460 L180 460 L140 420 L40 420" />
    <path d="M740 540 L380 540 L340 500 L100 500" />

    <!-- TOP-RIGHT quadrant -->
    <path d="M1140 380 L1140 240 L1280 240 L1320 200 L1320 80 L1540 80 L1580 40 L1860 40" />
    <path d="M1100 380 L1100 200 L1220 200 L1260 160 L1260 60 L1500 60" />
    <path d="M1060 380 L1060 280 L1140 280" />
    <path d="M1180 420 L1340 420 L1380 380 L1540 380 L1580 340 L1880 340" />
    <path d="M1180 460 L1420 460 L1460 420 L1660 420 L1700 380 L1880 380" />
    <path d="M1180 500 L1460 500 L1500 460 L1740 460 L1780 420 L1880 420" />
    <path d="M1180 540 L1540 540 L1580 500 L1820 500" />

    <!-- BOTTOM-LEFT -->
    <path d="M780 700 L780 840 L640 840 L600 880 L600 1000 L380 1000 L340 1040 L60 1040" />
    <path d="M820 700 L820 880 L700 880 L660 920 L660 1020 L420 1020" />
    <path d="M860 700 L860 800 L780 800" />
    <path d="M740 660 L580 660 L540 700 L380 700 L340 740 L40 740" />
    <path d="M740 620 L500 620 L460 660 L260 660 L220 700 L40 700" />
    <path d="M740 580 L460 580 L420 620 L180 620 L140 660 L40 660" />
    <path d="M740 540 L380 540 L340 580 L100 580" />

    <!-- BOTTOM-RIGHT -->
    <path d="M1140 700 L1140 840 L1280 840 L1320 880 L1320 1000 L1540 1000 L1580 1040 L1860 1040" />
    <path d="M1100 700 L1100 880 L1220 880 L1260 920 L1260 1020 L1500 1020" />
    <path d="M1060 700 L1060 800 L1140 800" />
    <path d="M1180 660 L1340 660 L1380 700 L1540 700 L1580 740 L1880 740" />
    <path d="M1180 620 L1420 620 L1460 660 L1660 660 L1700 700 L1880 700" />
    <path d="M1180 580 L1460 580 L1500 620 L1740 620 L1780 660 L1880 660" />
    <path d="M1180 540 L1540 540 L1580 580 L1820 580" />
  </g>

  <!-- Animated amber accent traces (current flow) -->
  <g fill="none" stroke-width="2" opacity="0.95">
    <path class="t-fast" stroke="url(#amber-trace)" d="M820 380 L820 200 L700 200 L660 160 L660 60 L420 60" />
    <path class="t-med"  stroke="url(#amber-trace)" d="M740 460 L500 460 L460 420 L260 420 L220 380 L40 380" />
    <path class="t-rev"  stroke="url(#amber-trace)" d="M1100 380 L1100 200 L1220 200 L1260 160 L1260 60 L1500 60" />
    <path class="t-fast" stroke="url(#amber-trace)" d="M1180 500 L1460 500 L1500 460 L1740 460 L1780 420 L1880 420" />
    <path class="t-rev"  stroke="url(#amber-trace)" d="M820 700 L820 880 L700 880 L660 920 L660 1020 L420 1020" />
    <path class="t-med"  stroke="url(#amber-trace)" d="M740 620 L500 620 L460 660 L260 660 L220 700 L40 700" />
    <path class="t-fast" stroke="url(#amber-trace)" d="M1100 700 L1100 880 L1220 880 L1260 920 L1260 1020 L1500 1020" />
    <path class="t-rev"  stroke="url(#amber-trace)" d="M1180 580 L1460 580 L1500 620 L1740 620 L1780 660 L1880 660" />
  </g>

  <!-- CENTER CHIP (rotated square / diamond) -->
  <g transform="translate(960 540)">
    <!-- chip glow halo -->
    <rect x="-220" y="-220" width="440" height="440" rx="14"
          transform="rotate(45)"
          fill="url(#node-glow)" filter="url(#soft)" opacity="0.6" class="chip-glow" />

    <!-- diamond chip -->
    <g transform="rotate(45)">
      <rect x="-200" y="-200" width="400" height="400" rx="12"
            fill="#FAF2E2" stroke="#1C1917" stroke-opacity="0.55" stroke-width="1.5" />
      <rect x="-170" y="-170" width="340" height="340" rx="6"
            fill="none" stroke="#1C1917" stroke-opacity="0.32" stroke-width="0.8" />

      <!-- pins around the chip (every 16px on each side) -->
      <g stroke="#1C1917" stroke-opacity="0.6" stroke-width="2.4" stroke-linecap="round">
        <!-- top edge pins -->
        <line x1="-170" y1="-220" x2="-170" y2="-200" /><line x1="-140" y1="-220" x2="-140" y2="-200" />
        <line x1="-110" y1="-220" x2="-110" y2="-200" /><line x1="-80"  y1="-220" x2="-80"  y2="-200" />
        <line x1="-50"  y1="-220" x2="-50"  y2="-200" /><line x1="-20"  y1="-220" x2="-20"  y2="-200" />
        <line x1="10"   y1="-220" x2="10"   y2="-200" /><line x1="40"   y1="-220" x2="40"   y2="-200" />
        <line x1="70"   y1="-220" x2="70"   y2="-200" /><line x1="100"  y1="-220" x2="100"  y2="-200" />
        <line x1="130"  y1="-220" x2="130"  y2="-200" /><line x1="160"  y1="-220" x2="160"  y2="-200" />
        <!-- bottom edge -->
        <line x1="-170" y1="200" x2="-170" y2="220" /><line x1="-140" y1="200" x2="-140" y2="220" />
        <line x1="-110" y1="200" x2="-110" y2="220" /><line x1="-80"  y1="200" x2="-80"  y2="220" />
        <line x1="-50"  y1="200" x2="-50"  y2="220" /><line x1="-20"  y1="200" x2="-20"  y2="220" />
        <line x1="10"   y1="200" x2="10"   y2="220" /><line x1="40"   y1="200" x2="40"   y2="220" />
        <line x1="70"   y1="200" x2="70"   y2="220" /><line x1="100"  y1="200" x2="100"  y2="220" />
        <line x1="130"  y1="200" x2="130"  y2="220" /><line x1="160"  y1="200" x2="160"  y2="220" />
        <!-- left edge -->
        <line x1="-220" y1="-170" x2="-200" y2="-170" /><line x1="-220" y1="-140" x2="-200" y2="-140" />
        <line x1="-220" y1="-110" x2="-200" y2="-110" /><line x1="-220" y1="-80"  x2="-200" y2="-80"  />
        <line x1="-220" y1="-50"  x2="-200" y2="-50"  /><line x1="-220" y1="-20"  x2="-200" y2="-20"  />
        <line x1="-220" y1="10"   x2="-200" y2="10"   /><line x1="-220" y1="40"   x2="-200" y2="40"   />
        <line x1="-220" y1="70"   x2="-200" y2="70"   /><line x1="-220" y1="100"  x2="-200" y2="100"  />
        <line x1="-220" y1="130"  x2="-200" y2="130"  /><line x1="-220" y1="160"  x2="-200" y2="160"  />
        <!-- right edge -->
        <line x1="200"  y1="-170" x2="220" y2="-170" /><line x1="200"  y1="-140" x2="220" y2="-140" />
        <line x1="200"  y1="-110" x2="220" y2="-110" /><line x1="200"  y1="-80"  x2="220" y2="-80"  />
        <line x1="200"  y1="-50"  x2="220" y2="-50"  /><line x1="200"  y1="-20"  x2="220" y2="-20"  />
        <line x1="200"  y1="10"   x2="220" y2="10"   /><line x1="200"  y1="40"   x2="220" y2="40"   />
        <line x1="200"  y1="70"   x2="220" y2="70"   /><line x1="200"  y1="100"  x2="220" y2="100"  />
        <line x1="200"  y1="130"  x2="220" y2="130"  /><line x1="200"  y1="160"  x2="220" y2="160"  />
      </g>
      <!-- corner notch dot -->
      <circle cx="-180" cy="-180" r="5" fill="#E87722" />
    </g>
  </g>

  <!-- Pulsing nodes at trace turning points -->
  <g>
    <g transform="translate(660 60)">  <circle r="14" fill="url(#node-glow)" /><circle r="3.5" fill="#E87722" class="node n1" /></g>
    <g transform="translate(1260 60)"> <circle r="14" fill="url(#node-glow)" /><circle r="3.5" fill="#E87722" class="node n2" /></g>
    <g transform="translate(40 380)">  <circle r="12" fill="url(#node-glow)" /><circle r="3" fill="#E87722" class="node n3" /></g>
    <g transform="translate(1880 420)"> <circle r="12" fill="url(#node-glow)" /><circle r="3" fill="#E87722" class="node n4" /></g>
    <g transform="translate(660 1020)"> <circle r="14" fill="url(#node-glow)" /><circle r="3.5" fill="#E87722" class="node n5" /></g>
    <g transform="translate(1260 1020)"><circle r="14" fill="url(#node-glow)" /><circle r="3.5" fill="#E87722" class="node n6" /></g>
    <g transform="translate(40 700)">  <circle r="12" fill="url(#node-glow)" /><circle r="3" fill="#E87722" class="node n7" /></g>
    <g transform="translate(1880 660)"> <circle r="12" fill="url(#node-glow)" /><circle r="3" fill="#E87722" class="node n8" /></g>
  </g>
</svg>
