<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360" role="presentation" aria-hidden="true">
  <defs>
    <linearGradient id="trace-amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E87722" stop-opacity="0" />
      <stop offset="50%"  stop-color="#E87722" stop-opacity="1" />
      <stop offset="100%" stop-color="#E87722" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="trace-amber-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E87722" stop-opacity="0" />
      <stop offset="50%"  stop-color="#F08C3A" stop-opacity="1" />
      <stop offset="100%" stop-color="#E87722" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="node-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#E87722" stop-opacity="0.85" />
      <stop offset="55%" stop-color="#E87722" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#E87722" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" />
    </filter>

    <style><![CDATA[
      @keyframes flow {
        from { stroke-dashoffset: 0;   }
        to   { stroke-dashoffset: -200; }
      }
      @keyframes flowRev {
        from { stroke-dashoffset: 0;  }
        to   { stroke-dashoffset: 200; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1);   opacity: 0.9; }
        50%      { transform: scale(1.6); opacity: 0.35; }
      }
      @keyframes glowBreath {
        0%, 100% { opacity: 0.55; }
        50%      { opacity: 1; }
      }
      .flow-x { stroke-dasharray: 10 8; animation: flow    5s linear infinite; }
      .flow-r { stroke-dasharray: 10 8; animation: flowRev 6s linear infinite; }
      .node   { transform-box: fill-box; transform-origin: center; animation: pulse 2.6s ease-in-out infinite; }
      .node.d1 { animation-delay: 0s;   }
      .node.d2 { animation-delay: 0.6s; }
      .node.d3 { animation-delay: 1.2s; }
      .node.d4 { animation-delay: 1.8s; }
      .halo   { animation: glowBreath 4s ease-in-out infinite; }
    ]]></style>
  </defs>

  <!-- Faint base traces -->
  <g fill="none" stroke="#1C1917" stroke-opacity="0.42" stroke-width="1" stroke-linecap="square">
    <path d="M0 60 L80 60 L96 76 L220 76 L236 60 L360 60" />
    <path d="M0 132 L60 132 L76 148 L300 148 L316 132 L360 132" />
    <path d="M0 232 L160 232 L176 248 L360 248" />
    <path d="M0 308 L80 308 L96 292 L220 292 L236 308 L360 308" />

    <path d="M48 0 L48 50 L64 66 L64 220 L48 236 L48 360" />
    <path d="M152 0 L152 50 L168 66 L168 260 L152 276 L152 360" />
    <path d="M256 0 L256 80 L240 96 L240 220 L256 236 L256 360" />
    <path d="M312 0 L312 80 L296 96 L296 280 L312 296 L312 360" />
  </g>

  <!-- Bright amber accent traces (animated current flow) -->
  <g fill="none" stroke-width="1.6" opacity="0.95">
    <path class="flow-x" stroke="url(#trace-amber)"   d="M0 196 L120 196 L136 180 L240 180 L256 196 L360 196" />
    <path class="flow-r" stroke="url(#trace-amber)"   d="M0 92  L100 92  L116 108 L260 108 L276 92  L360 92"  opacity="0.7" />
    <path class="flow-x" stroke="url(#trace-amber-v)" d="M196 0 L196 120 L212 136 L212 240 L196 256 L196 360" opacity="0.75" />
  </g>

  <!-- Pulsing nodes with halos -->
  <g>
    <g transform="translate(136 180)">
      <circle r="9" fill="url(#node-glow)" class="halo" />
      <circle r="2.8" fill="#E87722" class="node d1" />
    </g>
    <g transform="translate(256 196)">
      <circle r="9" fill="url(#node-glow)" class="halo" />
      <circle r="2.8" fill="#E87722" class="node d2" />
    </g>
    <g transform="translate(212 136)">
      <circle r="9" fill="url(#node-glow)" class="halo" />
      <circle r="2.8" fill="#E87722" class="node d3" />
    </g>
    <g transform="translate(196 256)">
      <circle r="9" fill="url(#node-glow)" class="halo" />
      <circle r="2.8" fill="#E87722" class="node d4" />
    </g>
  </g>

  <!-- Vias (solder pads) -->
  <g fill="#1C1917" fill-opacity="0.65">
    <circle cx="48"  cy="60"  r="3" />
    <circle cx="220" cy="76"  r="3" />
    <circle cx="48"  cy="132" r="3" />
    <circle cx="256" cy="132" r="3" />
    <circle cx="160" cy="232" r="3" />
    <circle cx="48"  cy="308" r="3" />
    <circle cx="312" cy="308" r="3" />
  </g>
  <g fill="none" stroke="#1C1917" stroke-opacity="0.5" stroke-width="1.1">
    <circle cx="48"  cy="60"  r="6.5" />
    <circle cx="220" cy="76"  r="6.5" />
    <circle cx="256" cy="132" r="6.5" />
    <circle cx="160" cy="232" r="6.5" />
    <circle cx="312" cy="308" r="6.5" />
  </g>

  <!-- IC chip with pins + corner dot -->
  <g transform="translate(96 168)">
    <rect width="100" height="68" rx="3.5" fill="#1C1917" fill-opacity="0.10" stroke="#1C1917" stroke-opacity="0.6" stroke-width="1.2" />
    <rect x="6" y="6" width="88" height="56" rx="2" fill="none" stroke="#1C1917" stroke-opacity="0.35" stroke-width="0.8" />
    <circle cx="11" cy="11" r="1.8" fill="#E87722" />
    <text x="50" y="40" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#1C1917" fill-opacity="0.55" letter-spacing="1.5">CRYPTO</text>
    <g stroke="#1C1917" stroke-opacity="0.6" stroke-width="1">
      <line x1="-6" y1="14" x2="0" y2="14" /><line x1="-6" y1="22" x2="0" y2="22" />
      <line x1="-6" y1="30" x2="0" y2="30" /><line x1="-6" y1="38" x2="0" y2="38" />
      <line x1="-6" y1="46" x2="0" y2="46" /><line x1="-6" y1="54" x2="0" y2="54" />
      <line x1="100" y1="14" x2="106" y2="14" /><line x1="100" y1="22" x2="106" y2="22" />
      <line x1="100" y1="30" x2="106" y2="30" /><line x1="100" y1="38" x2="106" y2="38" />
      <line x1="100" y1="46" x2="106" y2="46" /><line x1="100" y1="54" x2="106" y2="54" />
    </g>
  </g>

  <!-- Smaller IC chip -->
  <g transform="translate(270 36)">
    <rect width="56" height="40" rx="3" fill="#1C1917" fill-opacity="0.10" stroke="#1C1917" stroke-opacity="0.55" stroke-width="1.1" />
    <circle cx="9" cy="9" r="1.5" fill="#E87722" />
    <g stroke="#1C1917" stroke-opacity="0.55" stroke-width="0.9">
      <line x1="-5" y1="12" x2="0" y2="12" /><line x1="-5" y1="20" x2="0" y2="20" /><line x1="-5" y1="28" x2="0" y2="28" />
      <line x1="56" y1="12" x2="61" y2="12" /><line x1="56" y1="20" x2="61" y2="20" /><line x1="56" y1="28" x2="61" y2="28" />
    </g>
  </g>

  <!-- SMD components -->
  <g transform="translate(20 248)">
    <rect width="24" height="11" rx="1.5" fill="#1C1917" fill-opacity="0.6" />
    <rect x="-3" y="0" width="3" height="11" fill="#E87722" />
    <rect x="24" y="0" width="3" height="11" fill="#E87722" />
  </g>
  <g transform="translate(300 200)">
    <rect width="20" height="10" rx="1.5" fill="#1C1917" fill-opacity="0.6" />
    <rect x="-3" y="0" width="3" height="10" fill="#E87722" />
    <rect x="20" y="0" width="3" height="10" fill="#E87722" />
  </g>

  <!-- Capacitor symbol -->
  <g transform="translate(60 30)" stroke="#1C1917" stroke-opacity="0.6" stroke-width="1.2">
    <circle cx="0" cy="0" r="9" fill="none" />
    <circle cx="0" cy="0" r="3" fill="#E87722" fill-opacity="0.8" />
  </g>
  <g transform="translate(326 250)" stroke="#1C1917" stroke-opacity="0.6" stroke-width="1.2">
    <circle cx="0" cy="0" r="9" fill="none" />
    <circle cx="0" cy="0" r="3" fill="#E87722" fill-opacity="0.8" />
  </g>
</svg>
